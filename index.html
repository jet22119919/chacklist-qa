<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Checklist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #efeff2;
  padding: 30px;
  color: #2d2d2d;
}

.container {
  max-width: 800px;
  margin: auto;
}

h2 {
  font-weight: 600;
  margin-bottom: 20px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* CATEGORÍAS */
.categories {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.cat-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
  font-size: 14px;
}

.cat-btn.active {
  background: #a18cd1;
  color: white;
  border: none;
}

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: #ddd;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #a18cd1;
  border-radius: 10px;
}

.score {
  text-align: right;
  margin-top: 5px;
  font-size: 14px;
}

/* CHECKLIST */
.categoria {
  margin-top: 30px;
}

.categoria h3 {
  font-weight: 600;
  margin-bottom: 15px;
}

.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 10px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.item:hover {
  background: #e9e6f3;
}

.item input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.item span {
  flex: 1;
}

.item:has(input:checked) {
  background: #dcd6f7;
}

/* BOTÓN */
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #2d2d2d;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* RANKING */
.ranking {
  margin-top: 30px;
}

.ranking li {
  margin: 6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>QA Checklist</h2>

<select id="user">
  <option value="">Usuario</option>
  <option>Joss</option>
  <option>Jess</option>
  <option>QA</option>
</select>

<input type="text" id="project" placeholder="Nombre del proyecto">

<div class="categories">
  <div class="cat-btn active" data-cat="Elementos gráficos">Gráficos</div>
  <div class="cat-btn" data-cat="Prototipos">Prototipos</div>
  <div class="cat-btn" data-cat="Indicaciones">Indicaciones</div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="score" id="score">0%</div>

<div id="checklist"></div>

<button onclick="guardar()">Guardar checklist</button>

<div class="ranking">
  <h3>🏆 Ranking</h3>
  <ul id="rankingList"></ul>
</div>

</div>

<script>
const API_CHECKLIST = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=checklist_base";
const API_REGISTROS = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=registros";

let checklistData = [];
let activeCats = ["Elementos gráficos"];

/* RENDER */
function renderChecklist() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  const grouped = {};

  checklistData.forEach(item => {
    if (!activeCats.includes(item.categoria)) return;

    if (!grouped[item.categoria]) grouped[item.categoria] = [];
    grouped[item.categoria].push(item);
  });

  for (let categoria in grouped) {
    const div = document.createElement("div");
    div.className = "categoria";

    div.innerHTML = `<h3>${categoria}</h3>`;

    grouped[categoria].forEach(item => {
      div.innerHTML += `
        <label class="item">
          <input type="checkbox">
          <span>${item.item}</span>
        </label>
      `;
    });

    container.appendChild(div);
  }

  addListeners();
}

/* PROGRESS */
function addListeners() {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updateProgress);
  });
}

function updateProgress() {
  const checks = document.querySelectorAll("input[type=checkbox]");
  const total = checks.length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;

  const percent = total === 0 ? 0 : Math.round((checked / total) * 100);

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("score").textContent = percent + "%";
}

/* CATEGORÍAS */
document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");

    const cat = btn.dataset.cat;

    if (activeCats.includes(cat)) {
      activeCats = activeCats.filter(c => c !== cat);
    } else {
      activeCats.push(cat);
    }

    renderChecklist();
  });
});

/* GUARDAR */
function guardar() {
  const user = document.getElementById("user").value;
  const project = document.getElementById("project").value;

  if (!user || !project) {
    alert("Completa usuario y proyecto");
    return;
  }

  const checks = document.querySelectorAll("input[type=checkbox]");
  const total = checks.length;
  const completed = document.querySelectorAll("input[type=checkbox]:checked").length;

  const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

  const data = {
    usuario: user,
    proyecto: project,
    puntos: completed,
    porcentaje: percent,
    categorias_usadas: activeCats.join(", "),
    fecha: new Date().toLocaleString()
  };

  fetch(API_REGISTROS, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ data: [data] })
  })
  .then(res => res.json())
  .then(() => {
    alert("Guardado ✅");
    cargarRanking();
  });
}

/* RANKING */
function cargarRanking() {
  fetch(API_REGISTROS)
    .then(res => res.json())
    .then(data => {

      const ranking = {};

      data.forEach(row => {
        if (!ranking[row.usuario]) ranking[row.usuario] = 0;
        ranking[row.usuario] += Number(row.puntos || 0);
      });

      const sorted = Object.entries(ranking)
        .sort((a, b) => b[1] - a[1]);

      const list = document.getElementById("rankingList");
      list.innerHTML = "";

      sorted.forEach(([name, score], i) => {
        const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"🏃";
        const li = document.createElement("li");
        li.textContent = `${medal} ${name}: ${score} pts`;
        list.appendChild(li);
      });
    });
}

/* INIT */
fetch(API_CHECKLIST)
  .then(res => res.json())
  .then(data => {
    checklistData = data;
    renderChecklist();
  });

cargarRanking();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Checklist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #efeff2;
  padding: 30px;
  color: #2d2d2d;
}

.container {
  max-width: 800px;
  margin: auto;
}

h2 {
  font-weight: 600;
  margin-bottom: 20px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* CATEGORÍAS */
.categories {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.cat-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
  font-size: 14px;
}

.cat-btn.active {
  background: #a18cd1;
  color: white;
  border: none;
}

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: #ddd;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #a18cd1;
  border-radius: 10px;
}

.score {
  text-align: right;
  margin-top: 5px;
  font-size: 14px;
}

/* CHECKLIST */
.categoria {
  margin-top: 30px;
}

.categoria h3 {
  font-weight: 600;
  margin-bottom: 15px;
}

.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 10px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.item:hover {
  background: #e9e6f3;
}

.item input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.item span {
  flex: 1;
}

.item:has(input:checked) {
  background: #dcd6f7;
}

/* BOTÓN */
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #2d2d2d;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* RANKING */
.ranking {
  margin-top: 30px;
}

.ranking li {
  margin: 6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>QA Checklist</h2>

<select id="user">
  <option value="">Selecciona usuario</option>
  <option>Joss</option>
  <option>Jess</option>
  <option>QA</option>
</select>

<input id="project" placeholder="Nombre del proyecto">

<!-- CATEGORÍAS -->
<div class="categories">
  <div class="cat-btn active" data-cat="Elementos gráficos">Gráficos</div>
  <div class="cat-btn" data-cat="Prototipos">Prototipos</div>
  <div class="cat-btn" data-cat="Indicaciones">Indicaciones</div>
</div>

<!-- PROGRESO -->
<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>
<div class="score" id="score">0%</div>

<!-- CHECKLIST -->
<div id="checklist"></div>

<button onclick="guardar()">Aprobar checklist</button>

<!-- DASHBOARD -->
<div class="dashboard">
  <h3>📊 Proyectos</h3>
  <div id="projects"></div>

  <h3>🏆 Ranking</h3>
  <ul id="ranking"></ul>
</div>

</div>

<script>
const API_CHECKLIST = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=checklist_base";
const API_REGISTROS = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=registros";

let checklistData = [];
let activeCats = ["Elementos gráficos"];

/* RENDER */
function renderChecklist() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  const filtered = checklistData.filter(item =>
    activeCats.includes(item.categoria)
  );

  filtered.forEach(item => {
    container.innerHTML += `
      <label class="item">
        <input type="checkbox">
        ${item.item}
      </label>
    `;
  });

  addListeners();
}

/* PROGRESS */
function addListeners() {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updateProgress);
  });
}

function updateProgress() {
  const total = document.querySelectorAll("input[type=checkbox]").length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;

  const percent = total === 0 ? 0 : Math.round((checked / total) * 100);

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("score").textContent = percent + "%";
}

/* CATEGORÍAS CLICK */
document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");

    const cat = btn.dataset.cat;

    if (activeCats.includes(cat)) {
      activeCats = activeCats.filter(c => c !== cat);
    } else {
      activeCats.push(cat);
    }

    renderChecklist();
  });
});

/* GUARDAR */
function guardar() {
  const user = document.getElementById("user").value;
  const project = document.getElementById("project").value;

  if (!user || !project) {
    alert("Selecciona usuario y proyecto");
    return;
  }

  const total = document.querySelectorAll("input[type=checkbox]").length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;
  const percent = Math.round((checked / total) * 100);

  if (percent < 80) {
    alert("Checklist incompleto ❌");
    return;
  }

  const estado =
    percent >= 80 ? "aprobado" :
    percent >= 50 ? "revision" :
    "pendiente";

  fetch(API_REGISTROS, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      data: [{
        usuario: user,
        proyecto: project,
        puntos: checked,
        porcentaje: percent,
        categorias_usadas: activeCats.join(", "),
        estado: estado,
        fecha: new Date().toISOString()
      }]
    })
  })
  .then(() => {
    alert("Guardado ✅");
    cargarDashboard();
  });
}

/* DASHBOARD */
function cargarDashboard() {
  fetch(API_REGISTROS)
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("projects");
      container.innerHTML = "";

      data.forEach(row => {
        container.innerHTML += `
          <div class="card ${row.estado}">
            <strong>${row.proyecto}</strong><br>
            ${row.usuario} - ${row.porcentaje}%
          </div>
        `;
      });

      const ranking = {};

      data.forEach(row => {
        if (row.porcentaje >= 80) {
          if (!ranking[row.usuario]) ranking[row.usuario] = 0;
          ranking[row.usuario]++;
        }
      });

      const sorted = Object.entries(ranking)
        .sort((a, b) => b[1] - a[1]);

      const ul = document.getElementById("ranking");
      ul.innerHTML = "";

      sorted.forEach(([name, score]) => {
        ul.innerHTML += `<li>${name}: ${score} aprobados</li>`;
      });
    });
}

/* INIT */
fetch(API_CHECKLIST)
  .then(res => res.json())
  .then(data => {
    checklistData = data;
    renderChecklist();
  });

cargarDashboard();
</script>

</body>
</html>

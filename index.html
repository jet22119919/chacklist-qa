<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Checklist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🔥 BASE FIX */
*,
*::before,
*::after {
  box-sizing: border-box;
}

:root {
  --primary:#a18cd1;
  --bg:#f6f6f9;
  --card:#ffffff;
  --text:#2d2d2d;
  --muted:#888;
}

body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  margin:0;
  padding:20px;
  color:var(--text);
}

.container {
  max-width:900px;
  margin:auto;
}

/* HEADER */
.header h2 { margin:0; }
.header p { font-size:13px; color:var(--muted); }

/* CARD */
.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 25px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* INPUTS */
input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
}

/* CHECKBOX */
input[type="checkbox"] {
  width:18px;
  height:18px;
  flex-shrink:0;
}

/* CATEGORIES */
.categories {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.cat-btn {
  padding:6px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  font-size:13px;
}

.cat-btn.active {
  background:var(--primary);
  color:white;
  border:none;
}

/* PROGRESS */
.progress-bar {
  height:6px;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
}

.progress-fill {
  height:100%;
  width:0%;
  background:var(--primary);
  border-radius:10px;
}

/* CHECKLIST */
.item {
  display:flex;
  gap:10px;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
}

.item:hover { background:#f0ecfb; }
.item:has(input:checked) { background:#e8e1fa; }

/* OBS */
.obs-box {
  background:#f7f5fc;
  border-left:4px solid var(--primary);
  padding:14px;
  border-radius:10px;
}

/* IMAGES */
#preview {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:10px;
}

#preview img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--text);
  color:white;
  cursor:pointer;
}

/* ========================= */
/* 📱 MOBILE APP EXPERIENCE */
/* ========================= */

@media (max-width:768px){

  body {
    padding:0;
  }

  .container {
    max-width:100%;
    padding:16px;
  }

  .card {
    padding:18px;
    margin-bottom:16px;
  }

  .grid {
    grid-template-columns:1fr;
  }

  input, select, textarea {
    padding:14px;
    font-size:16px;
  }

  .item {
    padding:14px;
    gap:12px;
    align-items:flex-start;
  }

  .item span {
    font-size:15px;
    line-height:1.4;
  }

  input[type="checkbox"] {
    width:20px;
    height:20px;
  }

  .progress-bar {
    height:8px;
  }

  textarea {
    min-height:120px;
  }

  button {
    position:sticky;
    bottom:10px;
    padding:16px;
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>QA Checklist</h2>
<p>Revisión de calidad del proyecto</p>
</div>

<div class="card">

<div class="grid">
<div>
<label>Usuario</label>
<select id="user">
<option value="">Selecciona</option>
<option>Joss</option>
<option>Jess</option>
<option>QA</option>
</select>
</div>

<div>
<label>Proyecto</label>
<input id="project">
</div>
</div>

<label>Responsable</label>
<select id="asignado">
<option value="">Selecciona</option>
<option>Jess</option>
<option>QA</option>
<option>Joss Diseñadora</option>
</select>

</div>

<div class="card">

<div class="categories">
<div class="cat-btn active" data-cat="Elementos gráficos">Gráficos</div>
<div class="cat-btn" data-cat="Prototipos">Prototipos</div>
<div class="cat-btn" data-cat="Indicaciones">Indicaciones</div>
</div>

<div class="progress-bar">
<div id="progress" class="progress-fill"></div>
</div>

<div id="checklist"></div>

</div>

<div id="liderTools" class="card" style="display:none;">
<label>Observaciones</label>
<div class="obs-box">
<textarea id="observaciones"></textarea>
</div>

<label>Evidencias</label>
<input type="file" id="screenshot" multiple>
<div id="preview"></div>
</div>

<button onclick="guardar()">Enviar revisión</button>

<div id="stats" class="card" style="display:none;">
<h3>📊 Detalles por diseñador</h3>
<div id="statsContent"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("_v8Luk56bzfinD770");

const API_CHECKLIST="https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=checklist_base";
const API_REGISTROS="https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=registros";

const userEmails={
"Jess":"jessica@abeha.mx",
"QA":"harum@abeha.mx",
"Joss Diseñadora":"joselyn@abeha.mx"
};

let checklistData=[],activeCats=["Elementos gráficos"],screenshots=[],startTime=Date.now();

/* ROLES */
user.onchange=e=>{
const isJoss=e.target.value==="Joss";
liderTools.style.display=isJoss?"block":"none";
stats.style.display=isJoss?"block":"none";
if(isJoss) cargarStats();
};

/* CLOUDINARY */
async function uploadToCloudinary(file){
const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset","qa_uploads");

const res=await fetch("https://api.cloudinary.com/v1_1/dwp4o3rue/image/upload",{method:"POST",body:fd});
const data=await res.json();
return data.secure_url;
}

/* IMÁGENES */
screenshot.onchange=async e=>{
screenshots=[];
preview.innerHTML="Subiendo...";
for(let file of e.target.files){
const url=await uploadToCloudinary(file);
screenshots.push(url);
preview.innerHTML+=`<img src="${url}">`;
}
};

/* CHECKLIST */
function renderChecklist(){
checklist.innerHTML="";
checklistData.filter(i=>activeCats.includes(i.categoria))
.forEach(i=>{
checklist.innerHTML+=`
<label class="item">
<input type="checkbox" data-error="${i.tipo_error}">
<span>${i.item}</span>
</label>`;
});
document.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.onchange=updateProgress);
}

function updateProgress(){
const total=document.querySelectorAll("input[type=checkbox]").length;
const checked=document.querySelectorAll("input:checked").length;
progress.style.width=Math.round((checked/total)*100)+"%";
}

/* CATS */
document.querySelectorAll(".cat-btn").forEach(btn=>{
btn.onclick=()=>{
btn.classList.toggle("active");
const cat=btn.dataset.cat;
activeCats.includes(cat)
? activeCats=activeCats.filter(c=>c!==cat)
: activeCats.push(cat);
renderChecklist();
};
});

/* GUARDAR */
function guardar(){
const userVal=user.value;
const projectVal=project.value;
const asignadoVal=asignado.value;
const observacionesVal=observaciones.value||"";
const isJoss=userVal==="Joss";

if(!userVal||!projectVal) return alert("Completa datos");

const checkboxes=document.querySelectorAll("input[type=checkbox]");
const checked=document.querySelectorAll("input:checked").length;
const percent=Math.round((checked/checkboxes.length)*100);

/* ERRORES */
const errores=[];
checkboxes.forEach(cb=>{if(!cb.checked) errores.push(cb.dataset.error);});

/* EMAIL */
if(isJoss){
const imagesHTML=screenshots.map(u=>`<a href="${u}" target="_blank">Ver evidencia</a>`).join("<br>");

emailjs.send("service_4e3hn9i","template_rmdvpvd",{
to_email:userEmails[asignadoVal],
user:userVal,
percent:String(percent),
observaciones:observacionesVal,
images:imagesHTML
});
}

/* DB */
fetch(API_REGISTROS,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
data:[{
usuario:userVal,
proyecto:projectVal,
porcentaje:percent,
observaciones:observacionesVal,
screenshots:JSON.stringify(screenshots),
categorias_usadas:activeCats.join(", "),
errores:errores.join(", "),
fecha:new Date().toISOString(),
tiempo_segundos:Math.round((Date.now()-startTime)/1000)
}]
})
});

alert("Guardado ✅");
startTime=Date.now();
}

/* STATS */
function cargarStats(){
fetch(API_REGISTROS).then(r=>r.json()).then(data=>{
const stats={};

data.forEach(row=>{
if(row.usuario!=="Joss") return;
const errs=(row.errores||"").split(", ");
const key=row.proyecto;

if(!stats[key]) stats[key]={};

errs.forEach(e=>{
if(!e) return;
if(!stats[key][e]) stats[key][e]=0;
stats[key][e]++;
});
});

statsContent.innerHTML="";
Object.entries(stats).forEach(([u,errs])=>{
let html=`<div class="stat-card"><strong>${u}</strong><br>`;
Object.entries(errs).forEach(([e,c])=>{
html+=`• ${e}: ${c}<br>`;
});
html+="</div>";
statsContent.innerHTML+=html;
});
});
}

/* INIT */
fetch(API_CHECKLIST).then(r=>r.json()).then(d=>{
checklistData=d;
renderChecklist();
});
</script>

</body>
</html>

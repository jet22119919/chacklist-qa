<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Checklist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #efeff2;
  padding: 30px;
  color: #2d2d2d;
}

.container {
  max-width: 800px;
  margin: auto;
}

h2 {
  font-weight: 600;
  margin-bottom: 20px;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* CATEGORÍAS */
.categories {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.cat-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
  font-size: 14px;
}

.cat-btn.active {
  background: #a18cd1;
  color: white;
  border: none;
}

/* PROGRESS */
.progress-bar {
  height: 6px;
  background: #ddd;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #a18cd1;
  border-radius: 10px;
}

.score {
  text-align: right;
  margin-top: 5px;
  font-size: 14px;
}

/* CHECKLIST */
.categoria {
  margin-top: 30px;
}

.categoria h3 {
  font-weight: 600;
  margin-bottom: 15px;
}

.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 10px;
  transition: all 0.2s ease;
  cursor: pointer;
}

.item:hover {
  background: #e9e6f3;
}

.item input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

.item span {
  flex: 1;
}

.item:has(input:checked) {
  background: #dcd6f7;
}

/* BOTÓN */
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #2d2d2d;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* RANKING */
.ranking {
  margin-top: 30px;
}

.ranking li {
  margin: 6px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>QA Checklist</h2>

<select id="user">
  <option value="">Selecciona usuario</option>
  <option>Joss</option>
  <option>Jess</option>
  <option>QA</option>
</select>

<input id="project" placeholder="Nombre del proyecto">

<select id="asignado">
  <option value="">¿Quién hizo este proyecto?</option>
  <option>Jess</option>
  <option>QA</option>
  <option>Joss Diseñadora</option>
</select>

<div class="categories">
  <div class="cat-btn active" data-cat="Elementos gráficos">Gráficos</div>
  <div class="cat-btn" data-cat="Prototipos">Prototipos</div>
  <div class="cat-btn" data-cat="Indicaciones">Indicaciones</div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>
<div class="score" id="score">0%</div>

<div id="checklist"></div>

<div id="liderTools" style="display:none;">
  <textarea id="observaciones" placeholder="Observaciones"></textarea>

  <input type="file" id="screenshot" multiple>
  <div id="preview"></div>
</div>

<button onclick="guardar()">Enviar</button>

<div class="dashboard">
  <h3>📊 Proyectos</h3>
  <div id="projects"></div>

  <h3>🏆 Ranking</h3>
  <ul id="ranking"></ul>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("_v8Luk56bzfinD770");
})();

const API_CHECKLIST = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=checklist_base";
const API_REGISTROS = "https://sheetdb.io/api/v1/4myrrapuo10e9?sheet=registros";

const userEmails = {
  "Jess": "jessica@abeha.mx",
  "QA": "harum@abeha.mx",
  "Joss Diseñadora": "joselyn@abeha.mx"
};

let checklistData = [];
let activeCats = ["Elementos gráficos"];
let screenshots = [];

document.getElementById("user").addEventListener("change", function() {
  document.getElementById("liderTools").style.display =
    this.value === "Joss" ? "block" : "none";
});

document.getElementById("screenshot").addEventListener("change", function(e) {
  const files = Array.from(e.target.files);
  screenshots = [];

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(event) {
      screenshots.push(event.target.result);
      preview.innerHTML += `<img src="${event.target.result}" style="max-width:100px; margin:5px;">`;
    };
    reader.readAsDataURL(file);
  });
});

function renderChecklist() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  checklistData
    .filter(item => activeCats.includes(item.categoria))
    .forEach(item => {
      container.innerHTML += `
        <label class="item">
          <input type="checkbox">
          <span>${item.item}</span>
        </label>
      `;
    });

  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updateProgress);
  });
}

function updateProgress() {
  const total = document.querySelectorAll("input[type=checkbox]").length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;
  const percent = Math.round((checked / total) * 100);

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("score").textContent = percent + "%";
}

document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");
    const cat = btn.dataset.cat;

    activeCats = activeCats.includes(cat)
      ? activeCats.filter(c => c !== cat)
      : [...activeCats, cat];

    renderChecklist();
  });
});

function guardar() {
  const user = document.getElementById("user").value;
  const project = document.getElementById("project").value;
  const asignado = document.getElementById("asignado").value;

  const observacionesEl = document.getElementById("observaciones");
  const observaciones = observacionesEl ? observacionesEl.value : "";

  const isLider = user === "Joss";

  if (!user || !project) {
    alert("Completa usuario y proyecto");
    return;
  }

  if (isLider && !asignado) {
    alert("Selecciona quién hizo el proyecto");
    return;
  }

  const total = document.querySelectorAll("input[type=checkbox]").length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;
  const percent = Math.round((checked / total) * 100);

  if (!isLider && percent < 80) {
    alert("Completa el checklist");
    return;
  }

  if (isLider && !observaciones) {
    alert("Agrega observaciones");
    return;
  }

  const correo = userEmails[asignado];

  if (isLider && !correo) {
    alert("No se encontró el correo");
    return;
  }

  if (isLider) {
    const imagesHTML = screenshots.map(img =>
      `<img src="${img}" style="max-width:100%; margin:10px 0;">`
    ).join("");

emailjs.send("service_akaao78", "template_riaojci", {
  to_email: correo,
  user: user || "Sin usuario",
  percent: String(percent || 0),
  observaciones: observaciones || "Sin observaciones",
  images: imagesHTML || "Sin imágenes"
})
.then(res => {
  console.log("Correo enviado ✅", res);
  alert("Correo enviado ✉️");
})
.catch(err => {
  console.error("ERROR REAL:", JSON.stringify(err));
  alert("Error al enviar correo");
});
  }

  fetch(API_REGISTROS, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      data: [{
        usuario: user,
        proyecto: project,
        porcentaje: percent,
        observaciones: observaciones,
        screenshots: JSON.stringify(screenshots)
      }]
    })
  })
  .then(() => {
    alert("Guardado ✅");
    if (observacionesEl) observacionesEl.value = "";
    document.getElementById("preview").innerHTML = "";
    cargarDashboard();
  });
}

function cargarDashboard() {
  fetch(API_REGISTROS)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("projects");
      container.innerHTML = "";

      data.forEach(row => {
        const imgs = row.screenshots ? JSON.parse(row.screenshots) : [];

        const imagesHTML = screenshots.map(img =>
  `<img src="${img}" style="max-width:100%; margin:10px 0; border-radius:6px;" />`
).join("");

        container.innerHTML += `
          <div class="card">
            <strong>${row.proyecto}</strong><br>
            ${row.usuario} - ${row.porcentaje}%<br>
            <small>${row.observaciones || ""}</small>
            <div>${imagesHTML}</div>
          </div>
        `;
      });
    });
}

fetch(API_CHECKLIST)
  .then(res => res.json())
  .then(data => {
    checklistData = data;
    renderChecklist();
  });

cargarDashboard();
</script>

</body>
</html>

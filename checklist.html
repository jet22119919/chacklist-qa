<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA System</title>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f7f7fb;
  padding: 20px;
  color: #2d2d2d;
}

.container {
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
  font-weight: 600;
}

select, input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

.categories {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.cat-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: white;
}

.cat-btn.active {
  background: #a18cd1;
  color: white;
  border: none;
}

.progress-bar {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin: 15px 0;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a18cd1, #fbc2eb);
  border-radius: 10px;
  transition: 0.3s;
}

.categoria {
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin-top: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.categoria h3 {
  margin-bottom: 10px;
}

.item {
  display: flex;
  align-items: center;
  margin: 8px 0;
}

.item input {
  margin-right: 10px;
}

button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #2d2d2d;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.score {
  text-align: center;
  margin-top: 10px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

<h2>QA Checklist</h2>

<select id="user">
  <option value="">Usuario</option>
  <option>Joss</option>
  <option>Jess</option>
  <option>QA</option>
</select>

<input type="text" id="project" placeholder="Nombre del proyecto">

<div class="categories">
  <div class="cat-btn active" data-cat="Elementos gráficos">Gráficos</div>
  <div class="cat-btn" data-cat="Prototipos">Prototipos</div>
  <div class="cat-btn" data-cat="Indicaciones">Indicaciones</div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="score" id="score">0%</div>

<div id="checklist"></div>

<button onclick="guardar()">Guardar checklist</button>

</div>

<script>
const API_CHECKLIST = "https://sheetdb.io/api/v1/1ud32z3rjo5n7";
const API_REGISTROS = "https://sheetdb.io/api/v1/76earl8mghau3";

let checklistData = [];
let activeCats = ["Elementos gráficos"];

function renderChecklist() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  const grouped = {};

  checklistData.forEach(item => {
    if (!activeCats.includes(item.categoria)) return;

    if (!grouped[item.categoria]) grouped[item.categoria] = [];
    grouped[item.categoria].push(item);
  });

  for (let categoria in grouped) {
    const div = document.createElement("div");
    div.className = "categoria";

    div.innerHTML = `<h3>${categoria}</h3>`;

    grouped[categoria].forEach(item => {
      div.innerHTML += `
        <label class="item">
          <input type="checkbox" data-id="${item.id}">
          ${item.item}
        </label>
      `;
    });

    container.appendChild(div);
  }

  addListeners();
}

function addListeners() {
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", updateProgress);
  });
}

function updateProgress() {
  const checks = document.querySelectorAll("input[type=checkbox]");
  const total = checks.length;
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;

  const percent = Math.round((checked / total) * 100);

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("score").textContent = percent + "%";
}

// Categorías click
document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    btn.classList.toggle("active");

    const cat = btn.dataset.cat;

    if (activeCats.includes(cat)) {
      activeCats = activeCats.filter(c => c !== cat);
    } else {
      activeCats.push(cat);
    }

    renderChecklist();
  });
});

function guardar() {
  const user = document.getElementById("user").value;
  const project = document.getElementById("project").value;

  if (!user || !project) {
    alert("Completa usuario y proyecto");
    return;
  }

  const checks = document.querySelectorAll("input[type=checkbox]");
  const registros = [];

  checks.forEach(check => {
    registros.push({
      usuario: user,
      proyecto: project,
      item_id: check.dataset.id,
      valor: check.checked ? 1 : 0,
      categorias_usadas: activeCats.join(", "),
      fecha: new Date().toLocaleString()
    });
  });

  fetch(API_REGISTROS, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ data: registros })
  })
  .then(() => alert("Guardado ✅"));
}

fetch(API_CHECKLIST)
  .then(res => res.json())
  .then(data => {
    checklistData = data;
    renderChecklist();
  });
</script>

</body>
</html>
